name: Test Package with Laravel 12

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test-package:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]

    name: Laravel 12 (PHP ${{ matrix.php }})

    steps:
      - name: Checkout package repository
        uses: actions/checkout@v4
        with:
          path: laravel-microscope

      - name: Checkout Laravel test application
        uses: actions/checkout@v4
        with:
          repository: imanghafoori/laravel-microscope-tests
          path: laravel-app

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_sqlite, sqlite3, gd, zip, curl, dom, fileinfo, libxml, bcmath, openssl, tokenizer, json
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-laravel12-php-${{ matrix.php }}-${{ hashFiles('laravel-app/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-laravel12-php-${{ matrix.php }}-
            ${{ runner.os }}-composer-

      - name: Configure Laravel 12 and local package
        run: |
          cd laravel-app
          
          # Remove any existing version of the package
          composer remove imanghafoori/laravel-microscope --no-interaction --no-update 2>/dev/null || true
          
          # Require Laravel 12
          composer require "laravel/framework:^12.0" --no-interaction --no-update
          
          # Add local package repository
          composer config repositories.local-microscope '{"type": "path", "url": "../laravel-microscope", "options": {"symlink": true}}'
          
          # Require local package
          composer require "imanghafoori/laravel-microscope:@dev" --no-interaction --no-update
          
          # Update PHPUnit based on PHP version
          if [[ "${{ matrix.php }}" == "8.5" ]]; then
            # PHP 8.5 requires PHPUnit 11+
            composer require "phpunit/phpunit:^11.0" --dev --no-interaction --no-update
          elif [[ "${{ matrix.php }}" == "8.4" ]]; then
            # PHP 8.4 works with PHPUnit 10+
            composer require "phpunit/phpunit:^10.0" --dev --no-interaction --no-update
          else
            # PHP 8.2-8.3 work with PHPUnit 10+
            composer require "phpunit/phpunit:^10.0" --dev --no-interaction --no-update
          fi
          
          # Update testbench for Laravel 12
          composer require "orchestra/testbench:^10.0" --dev --no-interaction --no-update
          
          # Update common dependencies for Laravel 12
          composer require "symfony/console:^7.0" --no-interaction --no-update 2>/dev/null || true
          composer require "symfony/http-foundation:^7.0" --no-interaction --no-update 2>/dev/null || true
          composer require "league/flysystem:^3.0" --no-interaction --no-update 2>/dev/null || true

      - name: Install dependencies
        run: |
          cd laravel-app
          composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Verify installations
        run: |
          cd laravel-app
          echo "=== Installed Versions ==="
          composer show laravel/framework
          composer show phpunit/phpunit
          composer show imanghafoori/laravel-microscope || echo "Package not found"
          echo "=========================="

      - name: Prepare Laravel environment
        run: |
          cd laravel-app
          
          # Create .env if not exists
          if [ ! -f ".env" ]; then
            cp .env.example .env 2>/dev/null || echo "APP_NAME=Test\nAPP_ENV=testing\nAPP_KEY=" > .env
          fi
          
          # Generate app key
          php artisan key:generate --force
          
          # Clear caches
          php artisan config:clear
          php artisan cache:clear
          
          # Set up SQLite database for testing
          touch database/database.sqlite
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env

      - name: Publish package assets if needed
        run: |
          cd laravel-app
          # Check if package has config to publish
          if grep -q "MicroscopeServiceProvider" vendor/composer/installed.json 2>/dev/null; then
            php artisan vendor:publish --provider="Imanghafoori\LaravelMicroscope\MicroscopeServiceProvider" --tag=config --force 2>/dev/null || true
            php artisan vendor:publish --provider="Imanghafoori\LaravelMicroscope\MicroscopeServiceProvider" --tag=views --force 2>/dev/null || true
          fi

      - name: Run migrations if needed
        run: |
          cd laravel-app
          if [ -d "database/migrations" ] && [ -n "$(ls -A database/migrations/*.php 2>/dev/null)" ]; then
            php artisan migrate --force
          fi

      - name: Run tests with Laravel 12
        run: |
          cd laravel-app
          
          # Run tests using Laravel's test command
          php artisan test --verbose --colors=always

      - name: Run microscope-specific tests
        if: ${{ always() }}
        run: |
          cd laravel-app
          
          # Look for tests related to microscope
          echo "=== Looking for microscope tests ==="
          
          # Check if there are test files mentioning microscope
          if find tests -name "*[Mm]icroscope*.php" -type f | grep -q "."; then
            echo "Running microscope-specific tests..."
            for test_file in $(find tests -name "*[Mm]icroscope*.php" -type f); do
              echo "Running: $test_file"
              php artisan test "$test_file" --verbose --colors=always || true
            done
          else
            echo "No microscope-specific tests found, running all tests..."
            php artisan test --verbose --colors=always
          fi

      - name: Run PHPUnit directly (fallback)
        if: ${{ failure() }}
        run: |
          cd laravel-app
          echo "=== Trying PHPUnit directly ==="
          vendor/bin/phpunit --version
          vendor/bin/phpunit --verbose --colors=always

      - name: Check for dependency issues
        if: ${{ always() }}
        run: |
          cd laravel-app
          echo "=== Dependency Status ==="
          composer outdated --direct --format=json | jq -r '.installed[] | "\(.name): \(.version) -> \(.latest)"' || true

      - name: Upload test artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v3
        with:
          name: failure-details-php-${{ matrix.php }}
          path: |
            laravel-app/storage/logs/
            laravel-app/bootstrap/cache/
            laravel-app/vendor/composer/installed.json
          retention-days: 14